<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <title>Offline – Vote+</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --blue-light: #dbeafe;
      --text: #1e293b;
      --muted: #64748b;
      --bg: #f8fafc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 8px 32px rgba(37, 99, 235, 0.35);
    }

    .icon-wrap svg {
      width: 52px;
      height: 52px;
      color: #fff;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .tips {
      background: var(--blue-light);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      margin-bottom: 32px;
    }

    .tips h2 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--blue-dark);
      margin-bottom: 10px;
    }

    .tips ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tips li {
      font-size: 0.875rem;
      color: var(--blue-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tips li::before {
      content: "•";
      font-size: 1.2em;
      flex-shrink: 0;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      justify-content: center;
    }

    .retry-btn:hover { background: var(--blue-dark); }
    .retry-btn:active { transform: scale(0.97); }

    .retry-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .brand {
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <!-- Wifi-off icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>
      Vote+ couldn't connect to the server. Please check your internet
      connection and try again.
    </p>

    <div class="tips">
      <h2>What you can try</h2>
      <ul>
        <li>Check your Wi-Fi or mobile data</li>
        <li>Move closer to your router</li>
        <li>Disable airplane mode</li>
        <li>Retry in a few seconds</li>
      </ul>
    </div>

    <button class="retry-btn" onclick="retryConnection()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </button>

    <p class="brand">Vote+ · Election Management</p>
  </div>

  <script>
    function retryConnection() {
      window.location.reload();
    }

    // Auto-retry when connectivity is restored
    window.addEventListener("online", () => window.location.reload());
  </script>
</body>
</html>
